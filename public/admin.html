<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bellamare Tasks - Admin</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="navbar">
    <div class="nav-brand">
      <h1>BELLAMARE</h1>
      <span class="nav-subtitle">Admin Panel</span>
    </div>
    <div class="nav-right">
      <a href="/" class="btn btn-sm btn-outline">Back to Tasks</a>
      <button id="logoutBtn" class="btn btn-sm btn-outline">Logout</button>
    </div>
  </header>

  <main class="container">
    <!-- Admin Tabs -->
    <div class="tabs" style="margin-bottom:20px;">
      <button class="tab active" data-admin-tab="employees">Employee Management</button>
      <button class="tab" data-admin-tab="time-report">Time Report</button>
    </div>

    <!-- Employees Tab -->
    <div id="employeesTab">
      <div class="admin-header">
        <h2>Employee Management</h2>
        <div style="display:flex;gap:8px;">
          <button id="reassignOrphanedBtn" class="btn btn-sm btn-outline" style="display:none;">Reassign Orphaned Tasks</button>
          <button id="addEmployeeBtn" class="btn btn-primary">+ Add Employee</button>
        </div>
      </div>
      <div id="employeeList" class="employee-list"></div>
    </div>

    <!-- Reassign Orphaned Modal -->
    <div id="orphanModal" class="modal" style="display:none;">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2>Reassign Orphaned Tasks</h2>
          <button class="modal-close">&times;</button>
        </div>
        <p style="margin-bottom:12px;color:var(--text-light);font-size:14px;">
          These tasks lost their creator or assignee when an employee was deleted. You can reassign them to another employee.
        </p>
        <div id="orphanCount" class="error-msg" style="background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue);"></div>
        <div class="form-group">
          <label for="orphanEmployee">Reassign To</label>
          <select id="orphanEmployee"></select>
        </div>
        <div class="form-group">
          <label for="orphanMode">Reassign As</label>
          <select id="orphanMode">
            <option value="both">Both Creator & Assignee (recommended)</option>
            <option value="creator">Creator only</option>
            <option value="assignee">Assignee only</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-outline modal-close">Cancel</button>
          <button type="button" id="orphanReassignBtn" class="btn btn-primary">Reassign</button>
        </div>
      </div>
    </div>

    <!-- Time Report Tab -->
    <div id="timeReportTab" style="display:none;">
      <div class="admin-header">
        <h2>Time Report</h2>
      </div>
      <div class="time-report-filters">
        <select id="timeFilterEmployee" class="input-sm">
          <option value="">All Employees</option>
        </select>
        <input type="date" id="timeFilterFrom" class="input-sm" placeholder="From">
        <input type="date" id="timeFilterTo" class="input-sm" placeholder="To">
      </div>
      <div id="timeSummary" class="time-summary-cards"></div>
      <div id="timeReportTable"></div>
    </div>
  </main>

  <!-- Add/Edit Employee Modal -->
  <div id="empModal" class="modal" style="display:none;">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="empModalTitle">Add Employee</h2>
        <button class="modal-close">&times;</button>
      </div>
      <form id="empForm">
        <input type="hidden" id="empId">
        <div class="form-group">
          <label for="empUsername">Username *</label>
          <input type="text" id="empUsername" required placeholder="e.g., jsmith">
        </div>
        <div class="form-group">
          <label for="empPassword">Password <span id="pwdHint">*</span></label>
          <input type="password" id="empPassword" placeholder="Enter password">
        </div>
        <div class="form-group">
          <label for="empName">Full Name *</label>
          <input type="text" id="empName" required placeholder="e.g., Jane Smith">
        </div>
        <div class="form-group">
          <label for="empEmail">Email *</label>
          <input type="email" id="empEmail" required placeholder="e.g., jsmith@bellamaredevelopment.com">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="empPhone">Phone (for SMS)</label>
            <input type="tel" id="empPhone" placeholder="e.g., 555-123-4567">
          </div>
          <div class="form-group">
            <label for="empCarrier">Carrier</label>
            <select id="empCarrier">
              <option value="">-- Select --</option>
              <option value="verizon">Verizon</option>
              <option value="att">AT&T</option>
              <option value="tmobile">T-Mobile</option>
              <option value="sprint">Sprint</option>
              <option value="uscellular">US Cellular</option>
              <option value="metro">Metro PCS</option>
              <option value="boost">Boost Mobile</option>
              <option value="cricket">Cricket</option>
              <option value="googlefi">Google Fi</option>
              <option value="visible">Visible</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" id="empAdmin"> Make Admin
          </label>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-outline modal-close">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Employee</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/admin.js"></script>
</body>
</html>
